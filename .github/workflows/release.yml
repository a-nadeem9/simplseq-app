name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0"
        required: true
        default: "v1.0"

permissions:
  contents: write

jobs:
  release:
    name: Build release assets
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Choose version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build release archive
        shell: bash
        run: |
          chmod +x scripts/build_release.sh
          SIMPLSEQ_VERSION="${{ steps.version.outputs.version }}" \
            scripts/build_release.sh "$PWD/release_artifacts/${{ steps.version.outputs.version }}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          notes="SIMPLseq-nf App ${version} development release.

Install on Linux, WSL, or macOS:

\`\`\`bash
curl -fsSL https://github.com/a-nadeem9/simplseq-nf-app/releases/download/${version}/install-simplseq.sh | bash
simplseq run
\`\`\`"

          if gh release view "$version" >/dev/null 2>&1; then
            gh release upload "$version" \
              "release_artifacts/${version}/install-simplseq.sh" \
              "release_artifacts/${version}/simplseq-nf-app-${version}.tar.gz" \
              "release_artifacts/${version}/SHA256SUMS.txt" \
              --clobber
          else
            gh release create "$version" \
              "release_artifacts/${version}/install-simplseq.sh" \
              "release_artifacts/${version}/simplseq-nf-app-${version}.tar.gz" \
              "release_artifacts/${version}/SHA256SUMS.txt" \
              --title "$version" \
              --notes "$notes" \
              --prerelease
          fi
