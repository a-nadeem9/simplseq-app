name: Installer smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label to package and install"
        required: true
        default: "v1.0"
      run_macos:
        description: "Also run the macOS installer job"
        required: true
        type: boolean
        default: true

jobs:
  package:
    name: Package local release assets
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build local release archive
        shell: bash
        run: |
          chmod +x scripts/build_release.sh
          SIMPLSEQ_VERSION="${{ inputs.version }}" \
            scripts/build_release.sh "$PWD/release_assets"

      - name: Upload local release assets
        uses: actions/upload-artifact@v4
        with:
          name: simplseq-release-assets
          path: release_assets/

  linux:
    name: Linux installer
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: simplseq-release-assets
          path: release_assets

      - name: Run installer from local release assets
        shell: bash
        run: |
          SIMPLSEQ_VERSION="${{ inputs.version }}" \
          SIMPLSEQ_INSTALL_BASE_URL="$PWD/release_assets" \
            bash release_assets/install-simplseq.sh
          export PATH="$HOME/.local/bin:$PATH"
          simplseq --help
          simplseq run-headless --help

  macos:
    name: macOS installer
    needs: package
    if: ${{ inputs.run_macos }}
    runs-on: macos-latest

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: simplseq-release-assets
          path: release_assets

      - name: Run installer from local release assets
        shell: bash
        run: |
          SIMPLSEQ_VERSION="${{ inputs.version }}" \
          SIMPLSEQ_INSTALL_BASE_URL="$PWD/release_assets" \
            bash release_assets/install-simplseq.sh
          export PATH="$HOME/.local/bin:$PATH"
          simplseq --help
          simplseq run-headless --help
